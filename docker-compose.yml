services:
  frontend:
    build:
      context: ./apps/frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    networks:
      - flashpay-net
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./apps/backend
      target: dev
    working_dir: /app
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    volumes:
      - ./apps/backend:/app
      - go_mod_cache:/root/go/pkg/mod
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${BACKEND_PORT:-8080}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-flashpay}:${POSTGRES_PASSWORD:-flashpay}@postgres:5432/${POSTGRES_DB:-flashpay}?sslmode=disable
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-flashpay}
      DB_USER: ${POSTGRES_USER:-flashpay}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-flashpay}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${BACKEND_PORT:-8080}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - flashpay-net
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flashpay}
      POSTGRES_USER: ${POSTGRES_USER:-flashpay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flashpay}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - flashpay-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  flashpay-net:
    driver: bridge

volumes:
  go_mod_cache:
  pgdata:
